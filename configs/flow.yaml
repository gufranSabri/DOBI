seed: 42

# ── Models ────────────────────────────────────────────────────────────────────
SMALL_MODEL_ID   : "Qwen/Qwen3.5-0.8B"
LARGE_MODEL_ID   : "Qwen/Qwen3.5-2B"

# ── Diffusion ──────────────────────────────────────────────────────────────────
NOISE_STEPS: 1000
BETA_START: 1e-4
BETA_END: 0.02

# ── Dataset ────────────────────────────────────────────────────────────────────
DATASET_ID: "HuggingFaceTB/smoltalk"
# DATASET_SUBSET: "all"
DATASET_SUBSETS  :
  - "self-oss-instruct"
  - "metamathqa-50k"
  - "numina-cot-100k"
  - "openhermes-100k"
  - "smol-magpie-ultra"
MAX_TRAIN_SAMPLES: 50000
MAX_VAL_SAMPLES: 1000
MAX_LENGTH: 512
TRAIN_SPLIT_PCT: 0.98

# ── Training ───────────────────────────────────────────────────────────────────
TRAIN_EPOCHS: 2
PER_DEVICE_TRAIN_BATCH_SIZE: 8
PER_DEVICE_EVAL_BATCH_SIZE: 16
GRADIENT_ACCUMULATION_STEPS: 4
LR: 1e-4


STUDENT_FORCE: 0.50
FRACTIONAL_NOISING_STEPS: 0.10